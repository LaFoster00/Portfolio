<!doctype html>
<html lang="en">

<head>
    <title>Portfolio Lasse Foster</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="stylesheet" href="style/styles.css" />
    <script>
        // Apply saved theme immediately to prevent flash
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light');
        }
    </script>
</head>

<body>
    <t-header></t-header>

    <section class="section-heading">
        <h1>Lasse Foster</h1>
        <p>
            I am a <span id="age">unknown</span> years old software developer with a master's degree in Computer
            Science, specialized in interactive
            software development.
        </p>
    </section>

    <section class="projects-section">
        <div class="section-heading">
            <h1>Projects</h1>
            <p>This is a collection of some of the projects I worked on over the years and should give you a rough
                impression of my experience. </p>
        </div>

        <div class="project-card-list">
            <t-project-card href="projects.html#DGIR" image="projects/dgir/canvas.png" image-alt="DGIR preview"
                title="DGIR: Extensible Intermediate Representation"
                summary="My master's thesis project, implementing a extensible intermediate representation for educational use."
                roles="Research,Systems Architecture"></t-project-card>

            <t-project-card href="projects.html#GPU_WFC" image="projects/gpu_wfc/canvas.png"
                image-alt="GPU Accelerated WFC preview" title="GPU Accelerated WFC"
                summary="My bachelor thesis project, implementing the Wave Function Collapse algorithm on the GPU using Unity Compute Shaders."
                roles="Research, GPU Programming, Systems Architecture"></t-project-card>

            <t-project-card href="projects.html#SLIPPER" image="projects/slipper/Slipper_1.png"
                image-alt="Slipper Engine preview" title="Toy Vulkan Engine"
                summary="A from-scratch implementation of a Vulkan-based rendering engine in C++. The project was an educational endeavor to deepen my understanding of graphics programming and low-level rendering APIs."
                roles="Engine Programmer,Tools Developer"></t-project-card>

            <t-project-card href="projects.html#WHITE_ROOM" image="projects/WhiteRoom/WhiteRoom_Poster.jpg"
                image-alt="White Room preview" title="White Room"
                summary="An experimental virtual reality escape room at room scale focusing on a minimalistic environment and physical interaction design."
                roles="VR Developer, Interaction Design"></t-project-card>
        </div>
    </section>

    <script src="scripts/components.js"></script>
    <script src="scripts/nav-behaviour.js"></script>
    <script src="scripts/age.js"></script>

</html>
